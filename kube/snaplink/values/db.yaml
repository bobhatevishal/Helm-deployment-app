nameOverride: "db"
namespace: "snaplink-ns"

global:
  imageRegistry: <registry>

image:
  repository: <repo_name>
  tag: <image_tag>

service:
  port: 5432

env:
  - name: POSTGRES_USER
    value: <DB_USER>
  - name: POSTGRES_PASSWORD
    value: <DB_PASS>
  - name: POSTGRES_DB
    value: "urlshort"
