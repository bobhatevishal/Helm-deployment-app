apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.api.repository }}:{{ .Values.global.imageTag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: {{ .Values.api.servicePort }}
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: snaplink-db-creds
                  key: username
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: snaplink-db-creds
                  key: password
            - name: DB_HOST
              value: "db"
            - name: DB_NAME
              value: "{{ .Values.db.name }}"
            - name: DB_PORT
              value: "{{ .Values.db.servicePort }}"
            - name: REDIS_URL
              value: "redis://redis:{{ .Values.redis.servicePort }}/0"
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - protocol: TCP
      port: {{ .Values.api.servicePort }}
      targetPort: {{ .Values.api.servicePort }}
