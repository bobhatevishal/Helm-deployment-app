# ═══════════════════════════════════════════════
# URL Shortener — Custom PostgreSQL Configuration
# ═══════════════════════════════════════════════

# Connection
listen_addresses = '*'
port = 5432
max_connections = 100

# Memory
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Logging — useful for observability
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d.log'
log_statement = 'mod'
log_duration = on
log_min_duration_statement = 500

# WAL
wal_level = replica
max_wal_size = 256MB
min_wal_size = 64MB

# Locale
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
