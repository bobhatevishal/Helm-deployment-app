# ═══════════════════════════════════════════════
# URL Shortener — Custom Redis Configuration
# ═══════════════════════════════════════════════

# Network
bind 0.0.0.0
port 6379
protected-mode no

# Memory management
maxmemory 128mb
maxmemory-policy allkeys-lru

# Persistence — Append Only File for durability
appendonly yes
appendfilename "urlshort.aof"
appendfsync everysec

# Snapshotting
save 900 1
save 300 10
save 60 10000

# Key-space notifications (for monitoring)
notify-keyspace-events Ex

# Logging
loglevel notice

# Performance
tcp-keepalive 300
timeout 0
databases 4
